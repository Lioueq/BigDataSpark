services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: petstore
    ports:
      - "5432:5432"
    volumes:  
      - ./sql/pgsql:/docker-entrypoint-initdb.d
      - ./исходные данные:/seed
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./sql/clickhouse:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "clickhouse-client", "--user", "default", "--password", "clickhouse", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  spark:
    image: jupyter/pyspark-notebook:latest
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      JUPYTER_TOKEN: ""
      PYSPARK_PYTHON: python
      PYSPARK_DRIVER_PYTHON: python
    ports:
      - "8888:8888"
      - "4040:4040"
    volumes:
      - ./spark/jobs:/home/jovyan/work/jobs
      - ./spark/jars:/home/jovyan/work/jars
    working_dir: /home/jovyan/work